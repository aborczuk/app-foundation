name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Install uv
        uses: astral-sh/setup-uv@v4

      - name: Set up Python
        run: uv python install 3.12

      - name: Install dependencies
        run: uv sync --group dev

      - name: Validate system catalog
        run: uv run python scripts/validate_catalog.py

      - name: Validate governance assets
        run: uv run python scripts/validate_governance_assets.py

      - name: Enforce prompt word caps
        run: uv run python scripts/validate_prompt_word_caps.py

      - name: Validate Python docstrings on changed files
        run: |
          set -euo pipefail

          if [ "${{ github.event_name }}" = "pull_request" ]; then
            base_sha="${{ github.event.pull_request.base.sha }}"
          else
            base_sha="${{ github.event.before }}"
          fi

          changed_py_files="$(git diff --name-only "$base_sha" HEAD -- '*.py')"
          if [ -z "$changed_py_files" ]; then
            echo "No Python files changed; skipping docstring validation."
            exit 0
          fi

          python3 scripts/validate_python_docstrings.py $changed_py_files

      - name: Guard CodeGraph force indexing scope
        run: |
          set -euo pipefail

          if git grep -nE 'cgc[[:space:]]+index[[:space:]]+--force[[:space:]]+(\.|/)' -- 'scripts/*.sh' '.github/workflows/*.yml' '.github/workflows/*.yaml'; then
            echo "::error::Blocked unsafe CodeGraph usage: full-scope force index detected."
            echo "::error::Use scripts/cgc_safe_index.sh with a scoped path."
            exit 1
          fi

          if git grep -nE 'cgc[[:space:]]+index[[:space:]]+--force[[:space:]]+(\$REPO_ROOT|\$\{REPO_ROOT\}|/Users/andreborczuk/app-foundation)' -- 'scripts/*.sh' '.github/workflows/*.yml' '.github/workflows/*.yaml'; then
            echo "::error::Blocked unsafe CodeGraph usage: force index against repo root detected."
            echo "::error::Use scripts/cgc_safe_index.sh with a scoped path."
            exit 1
          fi

      - name: Lint with ruff
        run: uv run ruff check .

      - name: Run tests
        run: uv run pytest

  task-ledger-integrity:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Validate task ledger sequence (if present)
        run: |
          if [ -f .speckit/task-ledger.jsonl ]; then
            uv run python scripts/task_ledger.py validate --file .speckit/task-ledger.jsonl
          else
            echo "No .speckit/task-ledger.jsonl found. Skipping ledger validation."
          fi
