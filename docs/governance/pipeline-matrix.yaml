version: "2.3.2"
updated_utc: "2026-04-08T00:00:00Z"
source_of_truth: "constitution.md"
steps:
  - id: "01"
    command: "/speckit.specify"
    prerequisite: "none"
    output_artifact: "spec.md"
    audit_event: "backlog_registered"
  - id: "02"
    command: "/speckit.clarify"
    prerequisite: "spec.md"
    output_artifact: "spec.md (updated)"
    audit_event: "discovery_completed"
  - id: "03"
    command: "/speckit.research"
    prerequisite: "spec.md"
    output_artifact: "research.md"
    audit_event: "discovery_completed"
  - id: "04"
    command: "/speckit.plan"
    prerequisite: "research.md"
    output_artifact: "plan.md"
    audit_event: "plan_started"
  - id: "05"
    command: "/speckit.planreview"
    prerequisite: "plan.md"
    output_artifact: "plan.md (updated with open FQs)"
    audit_event: "planreview_completed"
  - id: "05a"
    command: "/speckit.feasibilityspike"
    prerequisite: "plan.md with open FQs"
    output_artifact: "spike.md + plan.md technology selection updates"
    audit_event: "feasibility_spike_completed"
  - id: "05b"
    command: "plan phase complete"
    prerequisite: "planreview + feasibility (if required)"
    output_artifact: "none"
    audit_event: "plan_approved"
  - id: "06"
    command: "/speckit.solution"
    prerequisite: "plan.md with no open FQs"
    output_artifact: "tasks.md, estimates.md, HUDs, acceptance tests"
    audit_event: "solution_approved"
  - id: "06a"
    command: "/speckit.tasking"
    prerequisite: "plan.md + design artifacts"
    output_artifact: "tasks.md"
    audit_event: "tasking_completed"
  - id: "06b"
    command: "/speckit.sketch"
    prerequisite: "tasks.md + codebase context"
    output_artifact: "estimates.md sketches + HUDs + acceptance tests"
    audit_event: "sketch_completed"
  - id: "06c"
    command: "/speckit.estimate"
    prerequisite: "tasks.md"
    output_artifact: "estimates.md scores"
    audit_event: "estimation_completed"
  - id: "06d"
    command: "/speckit.solutionreview"
    prerequisite: "solution artifacts"
    output_artifact: "solutionreview.md"
    audit_event: "solutionreview_completed"
  - id: "07"
    command: "/speckit.breakdown"
    prerequisite: "tasks.md (size > 5)"
    output_artifact: "tasks.md (split)"
    audit_event: "discovery_completed"
  - id: "09"
    command: "/speckit.analyze"
    prerequisite: "research.md + plan.md + tasks.md"
    output_artifact: "consistency report"
    audit_event: "quality_guards_passed"
  - id: "10"
    command: "/speckit.e2e"
    prerequisite: "plan.md + tasks.md"
    output_artifact: "e2e.md + scripts/e2e_*.sh"
    audit_event: "quality_guards_passed"
  - id: "11"
    command: "/speckit.implement"
    prerequisite: "e2e.md + tasks.md + estimates.md"
    output_artifact: "code + task-ledger events"
    audit_event: "task_started"
  - id: "12"
    command: "/speckit.checkpoint"
    prerequisite: "task in progress"
    output_artifact: "checkpoint validation output"
    audit_event: "tests_passed"
  - id: "13"
    command: "/speckit.e2e-run"
    prerequisite: "scripts/e2e_*.sh"
    output_artifact: "validation verdict"
    audit_event: "tests_passed"
  - id: "14"
    command: "scripts/offline_qa.py"
    prerequisite: "implementation diff + payload"
    output_artifact: "offline QA result"
    audit_event: "offline_qa_passed"
  - id: "15"
    command: "/speckit.close"
    prerequisite: "offline_qa_passed"
    output_artifact: "none"
    audit_event: "task_closed"
enforcement_rules:
  - code: "HARD_BLOCK_ARTIFACTS"
    summary: "Missing prerequisite artifacts hard-block dependent command entry."
  - code: "FEASIBILITY_FIRST"
    summary: "Open feasibility questions must be resolved before solution phase."
  - code: "QA_FIRST_CLOSE"
    summary: "No task can close without offline_qa_passed."
