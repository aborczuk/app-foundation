version: "1.0.0"
documents:
  - path: "constitution.md"
    role: "authoritative governance principles and SDLC gates"
  - path: "CLAUDE.md"
    role: "agent behavior and operational bootstrap"
  - path: "catalog.yaml"
    role: "system topology, services, and ownership map"
  - path: "docs/governance/pipeline-matrix.yaml"
    role: "machine-readable canonical workflow pipeline matrix"
  - path: "docs/governance/gate-reason-codes.yaml"
    role: "canonical deterministic gate reason-code catalog"
  - path: ".specify/command-manifest.yaml"
    role: "canonical command/event/script manifest with ledger contract metadata"
  - path: "command-manifest.yaml"
    role: "repo-root mirror of .specify/command-manifest.yaml"
edges:
  - from: "constitution.md"
    to: "docs/governance/pipeline-matrix.yaml"
    relation: "references"
  - from: "constitution.md"
    to: "docs/governance/gate-reason-codes.yaml"
    relation: "references"
  - from: "CLAUDE.md"
    to: "constitution.md"
    relation: "defers_to"
  - from: "constitution.md"
    to: ".specify/command-manifest.yaml"
    relation: "references"
  - from: ".specify/command-manifest.yaml"
    to: "command-manifest.yaml"
    relation: "mirrors"
