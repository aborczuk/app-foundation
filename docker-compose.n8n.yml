services:
  n8n:
    image: n8nio/n8n:latest
    container_name: ib-trading-n8n
    ports:
      - "5678:5678"
    environment:
      N8N_HOST: localhost
      N8N_PORT: "5678"
      N8N_PROTOCOL: http
      N8N_SECURE_COOKIE: "false"
      WEBHOOK_URL: http://localhost:5678/
      GENERIC_TIMEZONE: America/New_York
    volumes:
      - ./.speckit/n8n_data:/home/node/.n8n
    restart: unless-stopped
