version: 1.1.1
last_updated: '2026-04-13T00:00:00Z'
manifest:
  version: 1.1.1
  updated_utc: '2026-04-13T00:00:00Z'
  ledger_sync_policy:
  - If pipeline_ledger.py, task_ledger.py, .speckit/*-ledger.jsonl schema, or any
    emitted event contract changes, update this manifest in the same PR.
  - On every ledger-contract change, bump manifest.version and update updated_utc.
commands:
  speckit.specify:
    description: Create or update feature specification from natural language
    driver:
      mode: generative
      timeout_seconds: 300
    scripts:
    - .specify/scripts/bash/create-new-feature.sh
    - .specify/scripts/bash/check-prerequisites.sh
    - .specify/scripts/pipeline-scaffold.py
    - scripts/speckit_spec_gate.py
    - scripts/pipeline_ledger.py
    artifacts:
    - output_path: ${FEATURE_DIR}/spec.md
      template: spec-template.md
      scaffold_script: create-new-feature.sh
    - output_path: ${FEATURE_DIR}/checklists/requirements.md
      template: requirements-checklist-template.md
    emits:
    - event: backlog_registered
      required_fields: []
  speckit.clarify:
    description: Ask targeted clarification questions and encode answers into spec
    mode: legacy
    scripts:
    - .specify/scripts/bash/check-prerequisites.sh
    - scripts/pipeline_ledger.py
    artifacts: []
    emits:
    - event: spec_clarified
      required_fields: []
  speckit.split:
    description: Split an XL or L spec into smaller independently deliverable phase
      specs
    mode: legacy
    scripts:
    - .specify/scripts/bash/create-new-feature.sh
    - .specify/scripts/pipeline-scaffold.py
    artifacts:
    - output_path: ${FEATURE_DIR}/spec.md
      template: spec-template.md
      scaffold_script: create-new-feature.sh
    - output_path: ${FEATURE_DIR}/checklists/requirements.md
      template: requirements-checklist-template.md
    emits: []
  speckit.checklist:
    description: Generate custom checklists for a feature based on user requirements
    mode: legacy
    scripts:
    - .specify/scripts/bash/check-prerequisites.sh
    - .specify/scripts/pipeline-scaffold.py
    artifacts:
    - output_path: ${FEATURE_DIR}/checklists/${DOMAIN}.md
      template: checklist-template.md
    emits: []
  speckit.research:
    description: Assemble prior art, patterns, and integration options for the feature
    driver:
      mode: generative
      timeout_seconds: 240
    scripts:
    - .specify/scripts/bash/check-prerequisites.sh
    - .specify/scripts/pipeline-scaffold.py
    - scripts/pipeline_ledger.py
    artifacts:
    - output_path: ${FEATURE_DIR}/research.md
      template: research-template-compact.md
    emits:
    - event: research_completed
      required_fields: []
  speckit.plan:
    description: Create architecture, technology selection, data flow, and implementation
      strategy
    driver:
      mode: generative
      timeout_seconds: 300
    scripts:
    - .specify/scripts/bash/setup-plan.sh
    - .specify/scripts/bash/update-agent-context.sh
    - .specify/scripts/pipeline-scaffold.py
    - scripts/speckit_gate_status.py
    - scripts/speckit_plan_gate.py
    - scripts/pipeline_ledger.py
    artifacts:
    - output_path: ${FEATURE_DIR}/plan.md
      template: plan-template.md
      scaffold_script: setup-plan.sh
      consumed_by:
      - speckit.planreview
      - speckit.feasibilityspike
      - speckit.sketch
    - output_path: ${FEATURE_DIR}/data-model.md
      template: data-model-template.md
    - output_path: ${FEATURE_DIR}/quickstart.md
      template: quickstart-template.md
    emits:
    - event: plan_started
      required_fields: []
    - event: plan_approved
      required_fields:
      - feasibility_required
  speckit.planreview:
    description: Identify underspecified areas in the current plan by asking targeted
      clarification questions
    driver:
      mode: generative
      timeout_seconds: 180
    scripts:
    - .specify/scripts/bash/setup-plan.sh
    - .specify/scripts/pipeline-scaffold.py
    - scripts/pipeline_ledger.py
    artifacts:
    - output_path: ${FEATURE_DIR}/planreview.md
      template: plan-review-template.md
      consumed_by:
      - speckit.feasibilityspike
      - speckit.sketch
      - speckit.analyze
    emits:
    - event: planreview_completed
      required_fields:
      - fq_count
      - questions_asked
  speckit.feasibilityspike:
    description: Prove all Open Feasibility Questions in plan with targeted probes
    mode: legacy
    scripts:
    - .specify/scripts/bash/setup-plan.sh
    - .specify/scripts/pipeline-scaffold.py
    - scripts/pipeline_ledger.py
    artifacts:
    - output_path: ${FEATURE_DIR}/spike.md
      template: spike-template.md
    emits:
    - event: feasibility_spike_completed
      required_fields:
      - spike_artifact
      - fq_count
    - event: feasibility_spike_failed
      required_fields:
      - failed_fq
  speckit.tasking:
    description: Decompose an approved sketch.md into tasks.md, then perform estimate/breakdown
      stabilization and generate HUDs + acceptance tests
    mode: legacy
    scripts:
      - .specify/scripts/bash/check-prerequisites.sh
      - .specify/scripts/pipeline-scaffold.py
      - scripts/speckit_remake_huds.py
      - .specify/scripts/acceptance-test-scaffold.py
      - scripts/speckit_tasks_gate.py
      - scripts/pipeline_ledger.py
    artifacts:
    - output_path: ${FEATURE_DIR}/tasks.md
      template: tasks-template.md
      consumed_by:
      - speckit.estimate
      - speckit.breakdown
      - speckit.implement
      - speckit.checkpoint
    emits:
    - event: tasking_completed
      required_fields:
      - task_count
      - story_count
  speckit.tasking.hud-code:
    description: Scaffold a code-task HUD artifact for a task in the active feature directory
    mode: legacy
    scripts:
    - .specify/scripts/pipeline-scaffold.py
    artifacts:
    - output_path: ${FEATURE_DIR}/huds/${TASK_ID}.md
      template: hud-code-template.md
    emits: []
  speckit.tasking.hud-runbook:
    description: Scaffold a human-task runbook HUD artifact for a task in the active feature directory
    mode: legacy
    scripts:
    - .specify/scripts/pipeline-scaffold.py
    artifacts:
    - output_path: ${FEATURE_DIR}/huds/${TASK_ID}.md
      template: hud-runbook-template.md
    emits: []
  speckit.sketch:
    description: Generate the feature sketch artifact from approved plan context and
      repository-grounded discovery
    driver:
      mode: generative
      timeout_seconds: 180
    scripts:
    - .specify/scripts/bash/check-prerequisites.sh
    - .specify/scripts/pipeline-scaffold.py
    - scripts/pipeline_ledger.py
    artifacts:
    - output_path: ${FEATURE_DIR}/sketch.md
      template: sketch-template.md
      consumed_by:
      - speckit.solutionreview
      - speckit.tasking
      - speckit.analyze
    emits:
    - event: sketch_completed
      required_fields: []
  speckit.estimate:
    description: Estimate fibonacci complexity for each task by evaluating codebase
    mode: legacy
    scripts:
    - .specify/scripts/bash/check-prerequisites.sh
    - .specify/scripts/pipeline-scaffold.py
    - scripts/pipeline_ledger.py
    artifacts:
    - output_path: ${FEATURE_DIR}/estimates.md
      template: estimates-template.md
    - output_path: ${FEATURE_DIR}/huds/${TASK_ID}.md
      template: hud-code-template.md
    emits:
    - event: estimation_completed
      required_fields:
      - estimate_points
  speckit.breakdown:
    description: "Break down 8 or 13-point tasks in estimates.md into smaller pieces\
      \ (\u22645 points each)"
    mode: legacy
    scripts:
    - .specify/scripts/bash/check-prerequisites.sh
    artifacts: []
    emits: []
  speckit.analyze:
    description: Perform cross-artifact consistency and quality analysis after task
      generation
    mode: legacy
    scripts:
    - .specify/scripts/bash/check-prerequisites.sh
    - .specify/scripts/pipeline-scaffold.py
    - scripts/pipeline_ledger.py
    artifacts:
    - output_path: ${FEATURE_DIR}/analysis.md
      template: analysis-template.md
    emits:
    - event: analysis_completed
      required_fields:
      - critical_count
  speckit.solutionreview:
    description: 'Quality gate over sketch.md before tasking: validate sketch is complete,
      repo-grounded, and decomposition-ready'
    mode: legacy
    scripts:
    - .specify/scripts/bash/check-prerequisites.sh
    - .specify/scripts/pipeline-scaffold.py
    - scripts/pipeline_ledger.py
    artifacts:
    - output_path: ${FEATURE_DIR}/solutionreview.md
      template: solutionreview-template.md
      consumed_by:
      - speckit.tasking
    emits:
    - event: solutionreview_completed
      required_fields:
      - critical_count
      - high_count
  speckit.solution:
    description: Produce the solution_approved payload from sketch, solutionreview,
      tasking, and analyze context
    driver:
      mode: generative
      timeout_seconds: 180
    scripts:
    - scripts/pipeline_ledger.py
    artifacts: []
    emits:
    - event: solution_approved
      required_fields:
      - task_count
      - story_count
      - estimate_points
  speckit.e2e:
    description: Generate E2E testing pipeline artifacts (e2e.md + executable script)
    mode: legacy
    scripts:
    - .specify/scripts/bash/check-prerequisites.sh
    - .specify/scripts/pipeline-scaffold.py
    - scripts/pipeline_ledger.py
    artifacts:
    - output_path: ${FEATURE_DIR}/e2e.md
      template: e2e-template.md
    - output_path: scripts/e2e_${FEATURE_SLUG}.sh
      template: e2e-script-template.sh
    emits:
    - event: e2e_generated
      required_fields:
      - e2e_artifact
  speckit.e2e-run:
    description: Execute the E2E testing pipeline for the current feature as automation-first
      acceptance gate
    mode: legacy
    scripts:
    - scripts/e2e_${FEATURE_SLUG}.sh
    artifacts: []
    emits: []
  speckit.checkpoint:
    description: Validate a phase checkpoint from tasks.md by running the software
      and verifying observable behavior
    mode: legacy
    scripts:
    - .specify/scripts/bash/check-prerequisites.sh
    - scripts/speckit_implement_gate.py
    artifacts: []
    emits: []
  speckit.implement:
    description: Execute the implementation plan through driver-owned approval, validation,
      QA, and closeout sequencing
    mode: legacy
    scripts:
    - .specify/scripts/bash/check-prerequisites.sh
    - scripts/speckit_gate_status.py
    - scripts/speckit_implement_gate.py
    - scripts/speckit_prepare_ignores.py
    - scripts/speckit_offline_qa_handoff.py
    - scripts/offline_qa.py
    - scripts/task_ledger.py
    - scripts/cgc_safe_index.sh
    artifacts: []
    emits:
    - event: implementation_completed
      required_fields: []
  speckit.closeout:
    description: Close a completed task through the canonical append-first ledger path
      and hand off to checkpoint when a user story ends
    mode: legacy
    scripts:
    - .specify/scripts/bash/check-prerequisites.sh
    - scripts/speckit_closeout_task.py
    - scripts/task_ledger.py
    artifacts: []
    emits:
    - event: tests_passed
      required_fields: []
    - event: commit_created
      required_fields:
      - commit_sha
    - event: offline_qa_started
      required_fields: []
    - event: offline_qa_passed
      required_fields:
      - qa_run_id
    - event: task_closed
      required_fields: []
  speckit.taskstoissues:
    description: Convert existing tasks into actionable, dependency-ordered GitHub
      issues for the feature
    mode: legacy
    scripts:
    - .specify/scripts/bash/check-prerequisites.sh
    artifacts: []
    emits: []
  speckit.retro:
    description: Generate a retrospective for the current feature
    mode: legacy
    scripts:
    - .specify/scripts/bash/check-prerequisites.sh
    artifacts:
      - output_path: "${FEATURE_DIR}/retro.md"
        template: "retro-template.md"
  speckit.addtobacklog:
    description: Classify ad-hoc work against the current feature first, then route
      it to the current feature or universal backlog, with architectural fit check,
      estimate, spec sync when needed, and prerequisite readiness projection
    mode: legacy
    scripts:
    - .specify/scripts/bash/check-prerequisites.sh
    - scripts/pipeline_ledger.py
    artifacts: []
    emits:
    - event: backlog_registered
      required_fields: []
    - event: research_completed
      required_fields: []
    - event: plan_started
      required_fields: []
    - event: planreview_completed
      required_fields:
      - fq_count
      - questions_asked
    - event: plan_approved
      required_fields:
      - feasibility_required
    - event: sketch_completed
      required_fields: []
    - event: solutionreview_completed
      required_fields:
      - critical_count
      - high_count
    - event: estimation_completed
      required_fields:
      - estimate_points
    - event: tasking_completed
      required_fields:
      - task_count
      - story_count
    - event: solution_approved
      required_fields:
      - task_count
      - story_count
      - estimate_points
    - event: analysis_completed
      required_fields:
      - critical_count
    - event: e2e_generated
      required_fields:
      - e2e_artifact
  speckit.constitution:
    description: Create or update the project constitution from interactive or provided
      principle inputs
    mode: legacy
    scripts:
    - scripts/validate_constitution_sync.sh
    artifacts: []
    emits: []
  speckit.trello-sync:
    description: Sync the current feature's tasks.md to a Trello board using the MCP
      Trello Bridge
    mode: legacy
    scripts:
    - .specify/scripts/bash/check-prerequisites.sh
    artifacts: []
    emits: []
  speckit.clickup-sync:
    description: Bootstrap or report ClickUp sync status for the current speckit feature
      tree
    mode: legacy
    scripts:
    - .specify/scripts/bash/check-prerequisites.sh
    artifacts: []
    emits: []
manual_events:
  feature_closed:
    required_fields: []
